<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saman Cafeteria Menu</title>

  <!-- Global Error Logger Overlay (Visual feedback if scripts break) -->
  <script>
    window.addEventListener('error', function (e) {
      // Ignore cross-origin script errors and external CDN/Firebase warnings
      if (e.message === "Script error." || !e.filename || e.filename.indexOf('gstatic.com') !== -1 || e.lineno === 0) {
        return;
      }
      var div = document.getElementById('debug-error-box');
      if (!div) {
        div = document.createElement('div');
        div.id = 'debug-error-box';
        div.style.position = 'fixed';
        div.style.bottom = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = 'rgba(220, 53, 69, 0.98)';
        div.style.color = '#ffffff';
        div.style.padding = '15px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '13px';
        div.style.lineHeight = '1.4';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxSizing = 'border-box';
        div.style.borderTop = '3px solid #ff5f5f';
        div.style.direction = 'ltr';
        div.style.textAlign = 'left';
        document.documentElement.appendChild(div);
      }
      div.innerHTML = '<strong>JavaScript Error Detected:</strong><br>' + e.message + '<br><br><strong>File:</strong> ' + e.filename + '<br><strong>Line:</strong> ' + e.lineno + ':' + e.colno;
    });
  </script>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Saman Cafeteria - Premium Cafe Menu. Experience our rich hot drinks, refreshing cold beverages, and delicious desserts.">
  <meta name="keywords"
    content="Saman, Cafe, Cafeteria, Menu, Kurdish, Badini, Arabic, English, Coffee, Desserts, Cold Drinks">
  <link rel="stylesheet" href="styles.css">

  <!-- Firebase SDKs Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <!-- Config & DB layers -->
  <script src="firebase-config.js?v=2"></script>
  <script src="db.js?v=2"></script>
</head>

<body class="lang-ku"> <!-- Default language: Kurdish (Badini) -->

  <!-- Top Navigation & Language Bar -->
  <header class="top-header">
    <div class="lang-selector">
      <button class="lang-btn active" onclick="setLanguage('ku')" id="btn-lang-ku">Kurdî</button>
      <button class="lang-btn" onclick="setLanguage('ar')" id="btn-lang-ar">العربية</button>
      <button class="lang-btn" onclick="setLanguage('en')" id="btn-lang-en">English</button>
    </div>
  </header>

  <!-- Hero Banner Image Slider -->
  <section class="hero-slider-container" id="hero-slider">
    <!-- Slides will be inserted dynamically here -->
    <div class="slide active" id="slide-0" style="background-image: url('assets/bg1.png');"></div>
    <div class="slide" id="slide-1" style="background-image: url('assets/bg2.png');"></div>
    <div class="slide" id="slide-2" style="background-image: url('assets/bg3.png');"></div>

    <!-- Brand Block: Name centered, Logo on side, Location below name -->
    <div class="hero-brand-block" id="logo-wrapper">
      <div class="hero-center-text">
        <h1 class="hero-restaurant-name" id="hero-brand-name">کافتێريا سامان</h1>
        <a href="#" id="location-link" class="hero-location-link" target="_blank" rel="noopener noreferrer">
          <svg class="location-icon" viewBox="0 0 24 24">
            <path
              d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
          </svg>
          <span id="location-text">Loading...</span>
        </a>
      </div>
      <div class="logo-container">
        <img src="assets/logo.png" alt="Saman Cafeteria Logo" class="logo-img" id="main-logo">
      </div>
    </div>
  </section>

  <!-- Search Bar -->
  <div class="search-bar-container">
    <div class="search-input-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24">
        <path
          d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
      </svg>
      <input type="text" class="search-input" id="search-input" autocomplete="off">
      <button class="search-clear-btn" id="search-clear-btn" style="display: none;" onclick="clearSearch()">
        &times;
      </button>
    </div>
  </div>

  <!-- Circular Horizontal Scrollable Categories -->
  <nav class="categories-container">
    <div class="categories-wrapper" id="categories-list">
      <!-- Categories dynamically rendered here -->
    </div>
  </nav>

  <!-- Menu Section & Item Grid (2 items per row) -->
  <main class="menu-section">
    <h2 class="category-section-title" id="current-category-title">Categories</h2>
    <div class="menu-grid" id="menu-items-grid">
      <!-- Menu items dynamically rendered here -->
    </div>
  </main>

  <!-- Floating Cart Trigger Button -->
  <button class="cart-trigger" onclick="toggleCartDrawer(true)" id="cart-floating-btn" aria-label="Open Basket">
    <span class="cart-badge" id="cart-count">0</span>
    <span class="cart-text" id="cart-floating-text">سەبەتکا من</span>
    <svg class="cart-icon-svg" viewBox="0 0 24 24">
      <path
        d="M17.21 9l-4.38-6.56c-.18-.28-.5-.44-.83-.44-.33 0-.65.16-.83.44L6.79 9H2c-.55 0-1 .45-1 1v1c0 .55.45 1 1 1h1v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-8h1c.55 0 1-.45 1-1V10c0-.55-.45-1-1-1h-4.79zM9 9l3-4.5L15 9H9zm9 11H6v-8h12v8zm-7-6v4c0 .55-.45 1-1 1s-1-.45-1-1v-4c0-.55.45-1 1-1s1 .45 1 1zm4 0v4c0 .55-.45 1-1 1s-1-.45-1-1v-4c0-.55.45-1 1-1s1 .45 1 1z" />
    </svg>
  </button>

  <!-- Cart Drawer Overlay -->
  <div class="cart-drawer-overlay" id="cart-overlay" onclick="toggleCartDrawer(false)"></div>

  <!-- Cart Slide-out Drawer -->
  <aside class="cart-drawer" id="cart-drawer-panel">
    <div class="cart-header">
      <div class="cart-title">
        <svg style="width: 24px; height: 24px; fill: var(--accent-color);" viewBox="0 0 24 24">
          <path
            d="M17.21 9l-4.38-6.56c-.18-.28-.5-.44-.83-.44-.33 0-.65.16-.83.44L6.79 9H2c-.55 0-1 .45-1 1v1c0 .55.45 1 1 1h1v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-8h1c.55 0 1-.45 1-1V10c0-.55-.45-1-1-1h-4.79zM9 9l3-4.5L15 9H9zm9 11H6v-8h12v8z" />
        </svg>
        <span id="cart-drawer-title">My Basket</span>
      </div>
      <button class="close-btn" onclick="toggleCartDrawer(false)">&times;</button>
    </div>

    <!-- Items List inside Cart -->
    <div class="cart-items-list" id="cart-items-container">
      <!-- Cart items inserted here -->
    </div>

    <!-- Cart Footer with Total and Actions -->
    <div class="cart-footer">
      <div class="cart-total-row">
        <span id="cart-total-label">Total:</span>
        <span id="cart-total-value">0 IQD</span>
      </div>
      <div class="cart-actions">
        <button class="checkout-btn" onclick="checkoutOrder()" id="checkout-action-btn">
          Confirm Order
        </button>
        <button class="clear-btn" onclick="clearCart()" id="clear-cart-btn">
          Clear Basket
        </button>
      </div>
    </div>
  </aside>

  <!-- Receipt / Paper Order Modal -->
  <div class="modal-overlay" id="receipt-modal">
    <div class="receipt-card">
      <div class="receipt-header">
        <h2 id="receipt-title">ORDER RECEIPT</h2>
        <p id="receipt-date"></p>
      </div>

      <div class="receipt-divider"></div>

      <div class="receipt-items" id="receipt-items-container">
        <!-- Dynamically rendered order items -->
      </div>

      <div class="receipt-divider"></div>

      <div class="receipt-total-row">
        <span id="receipt-total-label">Total:</span>
        <span id="receipt-total-value">0 IQD</span>
      </div>

      <div class="receipt-divider"></div>

      <div class="receipt-buttons">
        <!-- WhatsApp Order Button -->
        <a href="#" id="receipt-whatsapp-btn" class="receipt-btn whatsapp-btn" target="_blank">
          <svg viewBox="0 0 24 24" class="btn-icon">
            <path
              d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.725 1.451 5.437.002 9.861-4.417 9.864-9.858.002-2.637-1.019-5.115-2.877-6.974-1.858-1.859-4.332-2.882-6.969-2.883-5.443 0-9.863 4.418-9.866 9.861-.001 1.716.452 3.39 1.31 4.887l-.988 3.606 3.799-.995zm11.166-7.51c-.097-.161-.355-.258-.742-.452-.387-.193-2.285-1.129-2.64-1.258-.354-.129-.613-.193-.871.193-.258.387-.999 1.258-1.225 1.516-.226.258-.452.29-.838.096-.387-.193-1.633-.602-3.11-1.92-1.15-1.026-1.926-2.294-2.152-2.682-.226-.388-.024-.598.17-.791.173-.173.387-.452.58-.677.194-.226.258-.387.387-.645.129-.258.064-.484-.033-.677-.097-.193-.871-2.1-1.194-2.872-.315-.75-.634-.649-.871-.661-.226-.011-.484-.013-.742-.013-.258 0-.677.097-1.032.484-.355.387-1.355 1.325-1.355 3.226 0 1.902 1.386 3.743 1.58 4.001.194.258 2.727 4.167 6.608 5.842.923.4 1.643.639 2.203.818.928.295 1.77.253 2.437.153.742-.112 2.285-.935 2.607-1.838.322-.903.322-1.677.226-1.838z" />
          </svg>
          <span id="receipt-wa-text">Send on WhatsApp</span>
        </a>

        <!-- Direct Phone Call Button -->
        <a href="tel:07508244332" id="receipt-call-btn" class="receipt-btn call-btn">
          <svg viewBox="0 0 24 24" class="btn-icon">
            <path
              d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
          </svg>
          <span id="receipt-call-text">Call 07508244332</span>
        </a>

        <!-- Done / Close Button -->
        <button onclick="closeReceiptModal()" class="receipt-close-btn" id="receipt-done-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-box"></div>

  <!-- JS Logic -->
  <!-- ١. کتبخانێن سەرەکی یێن فایربەیس (پێش کۆدێ تە بنڤیسە) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- ٢. فایلا ڕێکخستنا تە ئەوا مە نوکە چێکری -->
  <script src="firebase-config.js"></script>

  <!-- ٣. فایلا کۆدێ تە یێ سەرەکی (ئەوا د وێنێ IMG_9237.jpg دا هەی) -->
  <script src="app.js?v=2" defer></script>

</body>

</html>
